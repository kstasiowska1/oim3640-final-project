{% extends "base.html" %}

{% block title %}Home | FlipFinder{% endblock %}

{% block content %}
<section class="hero">
    <h2>Find Your Next House Flip</h2>
    <p>Search for listings and estimate whether the deal is worth it.</p>

    <form action="{{ url_for('search') }}" method="get" class="search-form">
        <input type="text" name="location" placeholder="Enter city or ZIP code" required>
        <button type="submit">Search</button>
    </form>
</section>
{% endblock %}
