{% extends "base.html" %}

{% block content %}
    <h1>House Flip Deal Analyzer</h1>
    <p>Enter the main deal numbers below.</p>

    <form method="POST" action="/analyze">
        <label>Purchase Price ($):</label><br>
        <input type="number" name="purchase_price" step="0.01" required><br><br>

        <label>Repair Costs ($):</label><br>
        <input type="number" name="rehab_cost" step="0.01" required><br><br>

        <label>Expected Sale Price ($):</label><br>
        <input type="number" name="sale_price" step="0.01" required><br><br>

        <label>Holding Costs ($):</label><br>
        <input type="number" name="holding_costs" step="0.01" required><br><br>

        <button type="submit">Analyze Deal</button>
    </form>
{% endblock %}
